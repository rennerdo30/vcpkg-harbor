version: '3.8'

# Simple deployment with filesystem storage (no external dependencies)
services:
  vcpkg-harbor:
    build: .
    ports:
      - "15151:15151"
    environment:
      # Server settings
      - VCPKG_SERVER_HOST=0.0.0.0
      - VCPKG_SERVER_PORT=15151
      - VCPKG_SERVER_WORKERS=4
      # Storage settings - using filesystem
      - VCPKG_STORAGE_TYPE=filesystem
      - VCPKG_STORAGE_PATH=/app/cache
      # Logging settings
      - VCPKG_LOG_LEVEL=INFO
      - VCPKG_LOG_JSON=true
      - VCPKG_LOG_FILE=/app/logs/vcpkg-harbor.log
      # Dashboard settings
      - VCPKG_DASHBOARD_ENABLED=true
      # Metrics settings
      - VCPKG_METRICS_ENABLED=true
    volumes:
      - vcpkg_cache:/app/cache
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:15151/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  vcpkg_cache:
