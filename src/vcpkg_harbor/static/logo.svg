<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366F1"/>
      <stop offset="100%" style="stop-color:#4F46E5"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <circle cx="100" cy="100" r="90" fill="url(#grad1)"/>

  <!-- Three stacked boxes representing packages -->
  <rect x="50" y="100" width="45" height="35" rx="4" fill="#E0E7FF" stroke="#A5B4FC" stroke-width="2"/>
  <rect x="105" y="100" width="45" height="35" rx="4" fill="#E0E7FF" stroke="#A5B4FC" stroke-width="2"/>
  <rect x="77" y="60" width="45" height="35" rx="4" fill="#C7D2FE" stroke="#A5B4FC" stroke-width="2"/>

  <!-- Simple wave lines -->
  <path d="M 30 150 Q 60 140, 100 150 Q 140 160, 170 150" fill="none" stroke="#A5B4FC" stroke-width="3" stroke-linecap="round"/>
  <path d="M 40 165 Q 70 155, 100 165 Q 130 175, 160 165" fill="none" stroke="#818CF8" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
</svg>
