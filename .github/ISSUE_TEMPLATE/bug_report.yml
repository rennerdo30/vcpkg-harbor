name: Bug Report
description: Report a bug or unexpected behavior
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      description: Please confirm the following before submitting
      options:
        - label: I have searched the existing issues and this bug has not been reported
          required: true
        - label: I am using the latest version of vcpkg-harbor
          required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is
      placeholder: Describe the bug...
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior
      placeholder: |
        1. Configure with '...'
        2. Run command '...'
        3. Make request to '...'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: A clear and concise description of what you expected to happen
      placeholder: What should have happened?
    validations:
      required: true

  - type: dropdown
    id: storage
    attributes:
      label: Storage Backend
      description: Which storage backend are you using?
      options:
        - Filesystem (default)
        - MinIO
        - AWS S3
        - Azure Blob Storage
        - Google Cloud Storage
        - Other/Custom
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: vcpkg-harbor version (run `vcpkg-harbor --version` or check pyproject.toml)
      placeholder: "2.0.0"
    validations:
      required: true

  - type: dropdown
    id: deployment
    attributes:
      label: Deployment Method
      description: How are you running vcpkg-harbor?
      options:
        - pip install
        - Docker
        - Docker Compose
        - From source
        - Kubernetes
        - Other
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Please provide your environment details
      placeholder: |
        - OS: [e.g., Ubuntu 22.04, macOS 14, Windows 11]
        - Python version: [e.g., 3.11.5]
        - vcpkg version: [e.g., 2024.01.12]
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Please paste any relevant log output (set `VCPKG_LOG_LEVEL=DEBUG` for more details)
      render: shell
      placeholder: |
        Paste your logs here...

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Add any other context about the problem here (screenshots, configuration, etc.)
