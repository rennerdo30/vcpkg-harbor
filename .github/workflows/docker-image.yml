name: Docker Image CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  test-docker:
    name: Test Docker Image
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'pull_request'
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Build test image
        run: docker build -t vcpkg-harbor-test .

      - name: Start services
        run: |
          docker network create vcpkg-test
          docker run -d --name minio --network vcpkg-test \
            -e MINIO_ROOT_USER=minioadmin \
            -e MINIO_ROOT_PASSWORD=minioadmin \
            minio/minio server /data
          sleep 5

      - name: Run container
        run: |
          docker run -d --name vcpkg-harbor --network vcpkg-test \
            -e VCPKG_MINIO_ENDPOINT=minio:9000 \
            -e VCPKG_STORAGE_TYPE=filesystem \
            -e VCPKG_STORAGE_PATH=/tmp/cache \
            -p 15151:15151 \
            vcpkg-harbor-test
          sleep 5

      - name: Test health endpoint
        run: |
          curl -f http://localhost:15151/health/live || exit 1

      - name: Cleanup
        if: always()
        run: |
          docker stop vcpkg-harbor minio || true
          docker rm vcpkg-harbor minio || true
          docker network rm vcpkg-test || true
